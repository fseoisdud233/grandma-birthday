<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>할머니 생신 🎉</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:sans-serif;
    background:linear-gradient(90deg,#fff0f3,#ffe5ec);
}

.container{
    max-width:600px;
    margin:0 auto 20px auto;
    background:white;
    padding:20px;
    border-radius:20px;
    border:4px solid #ffccd5;
    box-shadow:0 10px 20px rgba(255,182,193,0.3);
}

h1,h2{
    text-align:center;
    color:#ff4d7d;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:12px;
    border:2px solid #ffd1dc;
    box-sizing:border-box;
}

button{
    background:#ff4d7d;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* 게시판 */
.post{
    background:#fff9a6;
    padding:12px;
    margin-top:10px;
    border-radius:12px;
}

/* 룰렛 */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.grid div{
    background:#ffe5ec;
    padding:15px;
    text-align:center;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

.result{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
    color:#ff4d7d;
}

/* 노래 버튼 */
.song{
    background:#ffb3c6;
}
</style>
</head>

<body>

<div class="container">
<h1>🎉 할머니 생신 🎉</h1>

<button class="song" onclick="window.open('https://youtu.be/uoNK5xq2MhA?si=Zy7A0d0_lrKW8EVv')">
🎵 생일 축하 노래 듣기
</button>
</div>

<!-- 게시판 -->
<div class="container">
<h2>💌 게시판</h2>

<input id="name" placeholder="이름">
<input id="msg" placeholder="메시지">
<button onclick="send()">등록</button>

<div id="posts"></div>
</div>

<!-- 룰렛 -->
<div class="container">
<h2>🎁 제비뽑기</h2>

<div class="grid">
<div onclick="pick('안마쿠폰 💆')">?</div>
<div onclick="pick('뽀뽀포옹 😘')">?</div>
<div onclick="pick('저녁밥상 🍲')">?</div>
<div onclick="pick('출동대기 🎤')">?</div>
</div>

<div class="result" id="result"></div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* 🔥 여기만 네 Firebase 값 넣어 */
const firebaseConfig = {
  apiKey: "AIzaSyXXXX",
  authDomain: "grandma-birthday.firebaseapp.com",
  databaseURL: "https://grandma-birthday-default-rtdb.firebaseio.com",
  projectId: "grandma-birthday",
  storageBucket: "grandma-birthday.appspot.com",
  messagingSenderId: "826104826047",
  appId: "1:826104826047:web:xxxx"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* 💌 게시판 */
window.send = function(){
    const n = document.getElementById("name").value;
    const m = document.getElementById("msg").value;

    if(!n || !m) return alert("입력해");

    push(ref(db,"posts"),{
        name:n,
        msg:m,
        time:Date.now()
    });
};

onValue(ref(db,"posts"), snap=>{
    const box = document.getElementById("posts");
    box.innerHTML="";

    snap.forEach(v=>{
        const d = v.val();
        box.innerHTML += `
        <div class="post">
            <b>${d.name}</b><br>${d.msg}
        </div>`;
    });
});

/* 🎁 룰렛 */
window.pick = function(v){
    document.getElementById("result").innerText = "당첨: " + v;
};
</script>

</body>
</html>
