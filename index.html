<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>할머니 생신</title>

<style>
body {
    font-family: 'Nanum Gothic', sans-serif;
    background: linear-gradient(90deg,#fff0f3,#ffe5ec);
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 600px;
    margin: 0 auto 20px auto;
    background: white;
    padding: 20px;
    border-radius: 20px;
    border: 4px solid #ffccd5;
    box-shadow: 0 10px 25px rgba(255,182,193,0.3);
}

/* 제목 */
h1,h2,h3 {
    text-align: center;
    color: #ff4d7d;
}

/* 버튼 */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg,#ff4d7d,#ff8fa9);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* 입력 */
input {
    width: 100%;
    padding: 12px;
    margin: 5px 0;
    border-radius: 12px;
    border: 2px solid #ffd1dc;
    box-sizing: border-box;
}

/* 💌 게시판 */
.board {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 10px;
}

/* 카드 디자인 */
.post {
    background: #fff9a6;
    padding: 14px;
    border-radius: 16px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    transform: rotate(-0.5deg);
}

.post b {
    display: block;
    margin-bottom: 5px;
    color: #5a4b00;
}

/* 제비뽑기 */
.lottery {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.lottery div {
    padding: 15px;
    background: #ffe5ec;
    border-radius: 14px;
    text-align: center;
    cursor: pointer;
    font-weight: bold;
}

.result {
    text-align: center;
    margin-top: 10px;
    color: #ff4d7d;
    font-weight: bold;
}

/* 갤러리 */
.gallery {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.card {
    border: 2px solid #ffe5ec;
    border-radius: 14px;
    overflow: hidden;
}

.card img {
    width: 100%;
}

.card span {
    display: block;
    padding: 8px;
    text-align: center;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="container">
<h1>🎉 할머니 생신 🎉</h1>
</div>

<!-- 💌 게시판 -->
<div class="container">
<h2>게시판</h2>

<input id="name" placeholder="이름">
<input id="msg" placeholder="메시지">
<button onclick="addPost()">등록</button>

<div id="board" class="board"></div>
</div>

<!-- 🎁 제비뽑기 -->
<div class="container">
<h2>제비뽑기</h2>

<div class="lottery">
<div onclick="pick('안마쿠폰 💆')">?</div>
<div onclick="pick('뽀뽀포옹 😘')">?</div>
<div onclick="pick('저녁밥상 🍲')">?</div>
<div onclick="pick('출동대기 🎤')">?</div>
</div>

<div class="result" id="result"></div>
</div>

<!-- 🖼 갤러리 -->
<div class="container">
<h2>갤러리</h2>

<input id="imgName" placeholder="설명">
<input type="file" id="imgFile">
<button onclick="upload()">업로드</button>

<div id="gallery" class="gallery"></div>
</div>

<script>

/* ======================
   💌 LOCAL STORAGE 게시판
====================== */

let posts = JSON.parse(localStorage.getItem("posts") || "[]");

function renderPosts(){
    const board = document.getElementById("board");
    board.innerHTML = "";

    posts.forEach(p=>{
        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `<b>${p.name}</b>${p.msg}`;
        board.appendChild(div);
    });
}

function addPost(){
    const name = document.getElementById("name").value;
    const msg = document.getElementById("msg").value;

    if(!name || !msg) return;

    posts.push({name,msg});
    localStorage.setItem("posts", JSON.stringify(posts));

    renderPosts();
}

/* 제비뽑기 */
function pick(v){
    document.getElementById("result").innerText = "당첨: " + v;
}

/* 갤러리 (저장됨) */
let gallery = JSON.parse(localStorage.getItem("gallery") || "[]");

function renderGallery(){
    const g = document.getElementById("gallery");
    g.innerHTML = "";

    gallery.forEach(i=>{
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <img src="${i.img}">
            <span>${i.name}</span>
        `;
        g.appendChild(div);
    });
}

function upload(){
    const file = document.getElementById("imgFile").files[0];
    const name = document.getElementById("imgName").value;

    if(!file) return;

    const reader = new FileReader();
    reader.onload = e=>{
        gallery.push({img:e.target.result,name});
        localStorage.setItem("gallery", JSON.stringify(gallery));
        renderGallery();
    };
    reader.readAsDataURL(file);
}

/* 처음 로딩 */
renderPosts();
renderGallery();

</script>

</body>
</html>
