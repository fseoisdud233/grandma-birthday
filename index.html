<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할머니 생신 축하드려요!</title>
    <style>
        @import url('https://googleapis.com');
        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-image: linear-gradient(90deg, #fff0f3 50%, #ffe5ec 50%);
            background-size: 40px 100%; color: #4a373a; margin: 0;
            padding: 20px 20px 100px 20px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }
        .container {
            max-width: 600px; width: 100%; background: white; padding: 25px; border-radius: 24px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.4); box-sizing: border-box; margin-bottom: 20px;
            position: relative; z-index: 10; border: 4px solid #ffccd5; outline: 4px dashed #ff7494; outline-offset: -12px;
        }
        h1 { font-size: 28px; color: #ff7494; text-align: center; line-height: 1.4; }
        h2, h3 { color: #ff8fa9; text-align: center; margin-top: 10px; }
        p { font-size: 18px; line-height: 1.6; text-align: center; color: #614f52; }
        button, .btn-link {
            display: inline-block; width: 100%; padding: 15px; font-size: 18px; font-weight: bold; text-align: center;
            text-decoration: none; color: white; background-color: #ff7494; border: none; border-radius: 14px; cursor: pointer;
            box-shadow: 0 5px 0px #d95373, 0 8px 15px rgba(255, 116, 148, 0.3); transition: all 0.1s ease; margin: 15px 0; box-sizing: border-box;
        }
        button:active, .btn-link:active { transform: translateY(4px); box-shadow: 0 1px 0px #d95373, 0 4px 6px rgba(255, 116, 148, 0.3); }
        .btn-link { background-color: #ffb3c6; box-shadow: 0 5px 0px #d48c9e, 0 8px 15px rgba(255, 179, 198, 0.4); }
        .btn-floating-confetti {
            position: fixed; bottom: 25px; right: 25px; width: 70px; height: 70px; border-radius: 50%;
            background-color: #ff4d7d; color: white; font-size: 32px; display: flex; justify-content: center; align-items: center;
            border: 4px solid white; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25); z-index: 999; cursor: pointer; margin: 0; padding: 0;
        }
        .roulette-wrapper { position: relative; width: 290px; height: 290px; margin: 30px auto; }
        .roulette-arrow {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0;
            border-left: 16px solid transparent; border-right: 16px solid transparent; border-top: 28px solid #ff4d7d; z-index: 40;
        }
        .roulette-wheel {
            width: 100%; height: 100%; border-radius: 50%; position: relative; border: 10px solid #ff7494;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); transition: transform 3.5s cubic-bezier(0.1, 0.8, 0.1, 1); overflow: hidden; box-sizing: border-box;
        }
        .wheel-piece { position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%; }
        .piece1 { background-color: #ffb3c6; transform: rotate(0deg); }
        .piece2 { background-color: #ffe5ec; transform: rotate(90deg); }
        .piece3 { background-color: #ff8fa9; transform: rotate(180deg); }
        .piece4 { background-color: #ffccd5; transform: rotate(270deg); }
        .wheel-text { position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%; box-sizing: border-box; font-weight: 800; font-size: 14px; color: #4a373a; text-align: center; }
        .wheel-text-inner { position: absolute; width: 110px; left: 10px; top: 45px; text-align: center; }
        .roulette-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 48px; height: 48px; background: white; border-radius: 50%; border: 5px solid #ff7494; z-index: 35; }
        #couponResult { text-align: center; font-size: 20px; font-weight: bold; color: #ff4d7d; background: #fff5f7; padding: 15px; border-radius: 14px; border: 2px dashed #ffb3c6; margin-top: 15px; min-height: 30px; }
        
        /* 🎨 브라우저 검열 보안 우회를 성료한 가족 실시간 메모 보드 프레임 */
        .family-live-board {
            width: 100%; height: 450px; border: 2px solid #ffe5ec; border-radius: 16px;
            background: #fff9a6; box-shadow: inset 0 2px 8px rgba(0,0,0,0.06); margin-top: 15px;
        }
        
        hr { border: 0; height: 2px; background: #ffe5ec; margin: 30px 0; }
        .confetti-piece { position: fixed; width: 10px; height: 10px; border-radius: 50%; z-index: 999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>

    <button class="btn-floating-confetti" onclick="burstConfetti()">🎉</button>

    <!-- 대문 구역 -->
    <div class="container">
        <h1> 🎉 세상에서 가장 특별한<br>우리 할머니의 생일파티 🎉 </h1>
        <p> 할머니 생신 축하드려요 😀 </p>
        <p> 잠깐 잠깐 보기 전에 잠깐 생일 축하 노래를 한번 불러볼까요? </p>
        <a href="https://youtu.be" class="btn-link">🎵 노래 재생 </a>
    </div>

    <!-- 🌟 [버그 수정] 전가족 100% 상호 공유가 보장되는 실시간 포스트잇형 롤링페이퍼 및 사진첩 보드 -->
    <div class="container">
        <h3>💌 가족 실시간 공유 게시판 (편지 & 사진)</h3>
        <p style="font-size:13px; color:#ff7494; margin:0 0 10px 0;">💡 아래 입력창에 축하 글이나 인터넷 이미지 주소(링크)를 쓰면 전가족에게 즉시 보여요!</p>
        
        <!-- 우리가족 전용으로 새로 발급한 보안 통신 채널 위젯 -->
        <iframe src="https://cbox.ws" class="family-live-board" allowtransparency="yes" allow="autoplay" frameborder="0" marginheight="0" marginwidth="0" scrolling="auto"></iframe>
    </div>

    <!-- 룰렛 게임 구역 -->
    <div class="container">
        <h2>🎁 돌려돌려~ 할머니 효도 룰렛!</h2>
        <p>원판을 돌려 오늘의 효도 선물을 확인해 보세요!</p>
        <div class="roulette-wrapper">
            <div class="roulette-arrow"></div>
            <div id="wheel" class="roulette-wheel">
                <div class="wheel-piece piece1"></div><div class="wheel-piece piece2"></div><div class="wheel-piece piece3"></div><div class="wheel-piece piece4"></div>
                <div class="wheel-text" style="transform: rotate(0deg);"><div class="wheel-text-inner" style="transform: rotate(45deg);">안마쿠폰 💆</div></div>
                <div class="wheel-text" style="transform: rotate(90deg);"><div class="wheel-text-inner" style="transform: rotate(45deg);">출동대기 🎤</div></div>
                <div class="wheel-text" style="transform: rotate(180deg);"><div class="wheel-text-inner" style="transform: rotate(45deg);">저녁밥상 🍲</div></div>
                <div class="wheel-text" style="transform: rotate(270deg);"><div class="wheel-text-inner" style="transform: rotate(45deg);">뽀뽀포옹 😘</div></div>
            </div>
            <div class="roulette-center"></div>
        </div>
        <button id="spinBtn">🎯 룰렛 돌리기 시작!</button>
        <p id="couponResult">결과 대기 중...</p>
    </div>
    <script>
        // 초경량 초고속 폭죽 모듈
        function burstConfetti() {
            const colors = ['#ff7494', '#ffb3c6', '#ffccd5', '#ffe5ec', '#feca57', '#4cd137'];
            for (let i = 0; i < 70; i++) {
                const piece = document.createElement('div'); piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + 'vw'; piece.style.top = '-10px';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.transform = `scale(${Math.random() * 0.8 + 0.4})`;
                const duration = Math.random() * 2 + 1.5; piece.style.animationDuration = duration + 's';
                piece.style.animationDelay = Math.random() * 0.3 + 's'; document.body.appendChild(piece);
                setTimeout(() => { piece.remove(); }, (duration + 0.3) * 1000);
            }
        }
        window.addEventListener('DOMContentLoaded', () => { burstConfetti(); });

        // --- 🎪 룰렛 물리 구동 장치 ---
        const wheel = document.getElementById('wheel'); 
        const spinBtn = document.getElementById('spinBtn'); 
        const couponResult = document.getElementById('couponResult');
        
        const coupons = [
            "💆 손주의 든든한 어깨 안마 30분 이용권!", 
            "🎤 할머니가 부르면 언제든 달려가는 대기조 이용권!", 
            "🍲 아인이가 차려드리는 맛있는 저녁 밥상권!", 
            "😘 온 가족의 뽀뽀와 포옹 10회 이용권!"
        ];
        
        let currentRotation = 0; 
        let isSpinning = false;
        
        spinBtn.onclick = () => {
            if (isSpinning) return; isSpinning = true; 
            couponResult.innerText = "빙글빙글 도는 중... 🎲";
            
            const randomDegree = Math.floor(Math.random() * 360) + 1800; 
            currentRotation += randomDegree; 
            wheel.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                const finalAngle = (currentRotation % 360); 
                const normalizedAngle = (360 - finalAngle) % 360; 
                let targetIndex = 0;
                
                if (normalizedAngle >= 0 && normalizedAngle < 90) targetIndex = 0; 
                else if (normalizedAngle >= 90 && normalizedAngle < 180) targetIndex = 3; 
                else if (normalizedAngle >= 180 && normalizedAngle < 270) targetIndex = 2; 
                else targetIndex = 1;
                
                couponResult.innerText = "🎉 당첨: " + coupons[targetIndex]; 
                burstConfetti(); 
                isSpinning = false;
            }, 3500);
        };
    </script>
</body>
</html>
