<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>할머니 생신 파티 🎉</title>

<style>
body{
    font-family: sans-serif;
    background: linear-gradient(90deg,#fff0f3,#ffe5ec);
    margin:0;
    padding:20px;
}

.container{
    max-width:600px;
    margin:0 auto 20px auto;
    background:white;
    padding:20px;
    border-radius:20px;
    border:4px solid #ffccd5;
    box-shadow:0 10px 20px rgba(255,182,193,0.3);
}

h1,h2,h3{ text-align:center; color:#ff4d7d; }

input,button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:12px;
    border:2px solid #ffd1dc;
    box-sizing:border-box;
}

button{
    background:#ff4d7d;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* 게시판 */
.post{
    background:#fff9a6;
    padding:12px;
    margin-top:10px;
    border-radius:12px;
}

/* 제비뽑기 */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.grid div{
    background:#ffe5ec;
    padding:15px;
    text-align:center;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

.result{
    text-align:center;
    margin-top:10px;
    color:#ff4d7d;
    font-weight:bold;
}

/* 갤러리 */
.gallery{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.card img{
    width:100%;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>🎉 할머니 생신 🎉</h1>
</div>

<!-- 게시판 -->
<div class="container">
<h2>💌 게시판 (실시간 공유)</h2>

<input id="name" placeholder="이름">
<input id="msg" placeholder="메시지">
<button onclick="sendPost()">등록</button>

<div id="posts"></div>
</div>

<!-- 제비뽑기 -->
<div class="container">
<h2>🎁 제비뽑기</h2>

<div class="grid">
<div onclick="pick('안마쿠폰 💆')">?</div>
<div onclick="pick('뽀뽀포옹 😘')">?</div>
<div onclick="pick('저녁밥상 🍲')">?</div>
<div onclick="pick('출동대기 🎤')">?</div>
</div>

<div class="result" id="result"></div>
</div>

<!-- 갤러리 -->
<div class="container">
<h2>🖼 갤러리 (실시간 공유)</h2>

<input id="imgName" placeholder="설명">
<input type="file" id="imgFile">
<button onclick="upload()">업로드</button>

<div id="gallery" class="gallery"></div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onValue
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

import {
  getStorage,
  ref as sRef,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

/* 🔥 네 Firebase 설정 */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

/* =====================
   💌 게시판
===================== */

function sendPost(){
    const name = document.getElementById("name").value;
    const msg = document.getElementById("msg").value;

    push(ref(db,"posts"),{
        name:name,
        msg:msg,
        time:Date.now()
    });
}

onValue(ref(db,"posts"), snap=>{
    const box = document.getElementById("posts");
    box.innerHTML="";

    snap.forEach(v=>{
        const d = v.val();
        box.innerHTML += `
        <div class="post">
            <b>${d.name}</b><br>${d.msg}
        </div>`;
    });
});

/* =====================
   🎁 제비뽑기
===================== */
function pick(v){
    document.getElementById("result").innerText = "당첨: " + v;
}

/* =====================
   🖼 갤러리 (Storage)
===================== */

async function upload(){
    const file = document.getElementById("imgFile").files[0];
    const name = document.getElementById("imgName").value;

    const imgRef = sRef(storage,"images/" + Date.now());

    await uploadBytes(imgRef,file);
    const url = await getDownloadURL(imgRef);

    push(ref(db,"gallery"),{
        name:name,
        url:url
    });
}

onValue(ref(db,"gallery"), snap=>{
    const g = document.getElementById("gallery");
    g.innerHTML="";

    snap.forEach(v=>{
        const d = v.val();
        g.innerHTML += `
        <div class="card">
            <img src="${d.url}">
            <div>${d.name}</div>
        </div>`;
    });
});
</script>

</body>
</html>
