<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할머니 생신 축하드려요!</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap');

        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-image: linear-gradient(90deg, #fff0f3 50%, #ffe5ec 50%);
            background-size: 40px 100%;
            color: #4a373a;
            margin: 0;
            padding: 20px 20px 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.4);
            margin-bottom: 20px;
            border: 4px solid #ffccd5;
            outline: 4px dashed #ff7494;
            outline-offset: -12px;
        }

        h1 { font-size: 28px; color: #ff7494; text-align: center; }
        h2, h3 { color: #ff8fa9; text-align: center; }

        p { font-size: 18px; text-align: center; }

        button, .btn-link {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #ff7494;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            margin: 15px 0;
        }

        .btn-link { background-color: #ffb3c6; display:block; text-align:center; text-decoration:none; }

        .postit-board {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .postit-item {
            background: #fff9a6;
            padding: 15px;
            border-radius: 8px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .photo-card {
            background: #fff;
            padding: 10px;
            border-radius: 14px;
            border: 2px solid #ffe5ec;
        }

        .photo-card img {
            width: 100%;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 14px;
            border: 2px solid #ffe5ec;
        }

        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-20px); opacity:1; }
            100% { transform: translateY(100vh); opacity:0; }
        }
    </style>
</head>

<body>

<button onclick="burstConfetti()">🎉</button>

<!-- 제목 -->
<div class="container">
    <h1>🎉 우리 할머니 생신 🎉</h1>
    <p>축하드립니다!</p>
</div>

<!-- 댓글 -->
<div class="container">
    <h3>💌 댓글</h3>
    <input id="nameInput" placeholder="이름">
    <input id="messageInput" placeholder="메시지">
    <button id="submitBtn">등록</button>

    <div id="commentList" class="postit-board"></div>
</div>

<!-- 갤러리 -->
<div class="container">
    <h3>🖼️ 갤러리</h3>

    <input id="imgName" placeholder="사진 설명">
    <input type="file" id="imgFile">
    <button id="uploadBtn">업로드</button>

    <div id="gallery" class="photo-grid"></div>
</div>

<!-- Firebase (compat 버전: 중요) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
    apiKey: "AIzaSyAHF0aSqAGZ6N61MEP8SMUOLDYnXfrXVX8",
    authDomain: "grandma-birthday.firebaseapp.com",
    databaseURL: "https://grandma-birthday-default-rtdb.firebaseio.com",
    projectId: "grandma-birthday",
    storageBucket: "grandma-birthday.appspot.com",
    messagingSenderId: "826104826047",
    appId: "1:826104826047:web:0c774d0289d03de0b89e0"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const storage = firebase.storage();

/* ================= 댓글 ================= */
const commentRef = db.ref("comments");

document.getElementById("submitBtn").onclick = () => {
    const n = nameInput.value;
    const m = messageInput.value;

    if (!n || !m) return alert("입력!");

    commentRef.push({ name: n, message: m });

    nameInput.value = "";
    messageInput.value = "";
};

commentRef.on("value", (snap) => {
    const list = document.getElementById("commentList");
    list.innerHTML = "";

    snap.forEach(child => {
        const v = child.val();

        const div = document.createElement("div");
        div.className = "postit-item";
        div.innerHTML = `<b>${v.name}</b><br>${v.message}`;

        list.appendChild(div);
    });
});

/* ================= 갤러리 ================= */
const galleryRef = db.ref("gallery");

document.getElementById("uploadBtn").onclick = async () => {
    const file = imgFile.files[0];
    const name = imgName.value;

    if (!file || !name) return alert("입력!");

    const ref = storage.ref("images/" + Date.now() + file.name);

    await ref.put(file);
    const url = await ref.getDownloadURL();

    galleryRef.push({ name, url });
};

/* 실시간 갤러리 */
galleryRef.on("value", (snap) => {
    const g = document.getElementById("gallery");
    g.innerHTML = "";

    snap.forEach(child => {
        const v = child.val();

        const div = document.createElement("div");
        div.className = "photo-card";
        div.innerHTML = `
            <img src="${v.url}">
            <div>${v.name}</div>
        `;

        g.appendChild(div);
    });
});

/* ================= 효과 ================= */
function burstConfetti() {
    for (let i = 0; i < 30; i++) {
        const d = document.createElement("div");
        d.className = "confetti-piece";
        d.style.left = Math.random()*100 + "vw";
        d.style.background = "#ff7494";
        d.style.animationDuration = (Math.random()*2+1)+"s";
        document.body.appendChild(d);
        setTimeout(()=>d.remove(), 3000);
    }
}
</script>

</body>
</html>
