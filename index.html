<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>할머니 생신 축하드려요!</title>

<style>
body {
    font-family: 'Nanum Gothic', sans-serif;
    background: linear-gradient(90deg, #fff0f3 50%, #ffe5ec 50%);
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
    min-height: 100vh;

    display: flex;
    flex-direction: column;
    align-items: center;
}

/* 컨테이너 */
.container {
    max-width: 600px;
    width: 100%;
    background: white;
    padding: 22px;
    border-radius: 24px;
    margin-bottom: 20px;
    border: 4px solid #ffccd5;
    box-shadow: 0 10px 25px rgba(255, 182, 193, 0.4);
    box-sizing: border-box;
    overflow: hidden; /* ✔ 오른쪽 튀어나옴 방지 */
}

/* 제목 */
h1 {
    font-size: 24px;
    color: #ff4d7d;
    text-align: center;
}

h2, h3 {
    text-align: center;
    color: #ff7a9a;
}

/* 설명 */
p {
    text-align: center;
    font-size: 15px;
    color: #555;
}

/* 버튼 */
button, .music-btn {
    width: 100%;
    display: block;
    padding: 12px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #ff4d7d, #ff8fa9);
    color: white;
    font-weight: bold;
    font-size: 16px;
    text-align: center;
    text-decoration: none;
    margin-top: 10px;
    box-sizing: border-box;
}

button:active {
    transform: scale(0.98);
}

/* 게시판 */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 12px;
    border: 2px solid #ffd1dc;
    box-sizing: border-box;
}

.postit-board {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
}

.postit-item {
    background: #fff9a6;
    padding: 12px;
    border-radius: 10px;
}

/* 제비뽑기 */
.lottery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 10px;
}

.lottery div {
    background: linear-gradient(135deg, #fff5b7, #ffd6e7);
    padding: 18px;
    border-radius: 14px;
    text-align: center;
    font-weight: bold;
    cursor: pointer;
}

.result {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
    color: #ff4d7d;
}

/* 갤러리 */
.photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
}

.photo-card {
    background: white;
    border-radius: 14px;
    border: 2px solid #ffe5ec;
    padding: 8px;
}

.photo-card img {
    width: 100%;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- 1 -->
<div class="container">
    <h1>🎉 할머니 생신 축하드려요 😀</h1>

    <p>잠깐 보기 전에 생일 축하 노래를 한번 불러볼까요?</p>

    <a class="music-btn"
       href="https://youtu.be/uoNK5xq2MhA?si=Zy7A0d0_lrKW8EVv"
       target="_blank">
        🎵 노래 재생
    </a>
</div>

<!-- 2 게시판 -->
<div class="container">
    <h3>💌 게시판</h3>

    <input id="name" placeholder="이름">
    <input id="msg" placeholder="메시지">
    <button onclick="addPost()">등록</button>

    <div id="board" class="postit-board"></div>
</div>

<!-- 3 제비뽑기 -->
<div class="container">
    <h3>🎁 효도 제비뽑기</h3>

    <div class="lottery">
        <div onclick="pick('안마쿠폰 💆')">❓</div>
        <div onclick="pick('뽀뽀포옹 😘')">❓</div>
        <div onclick="pick('저녁밥상 🍲')">❓</div>
        <div onclick="pick('출동대기 🎤')">❓</div>
    </div>

    <div class="result" id="result"></div>
</div>

<!-- 4 갤러리 -->
<div class="container">
    <h3>🖼️ 갤러리</h3>

    <input id="imgName" placeholder="설명">
    <input type="file" id="imgFile">
    <button onclick="upload()">업로드</button>

    <div id="gallery" class="photo-grid"></div>
</div>

<script>
/* 게시판 */
function addPost(){
    const name = document.getElementById("name").value;
    const msg = document.getElementById("msg").value;

    const div = document.createElement("div");
    div.className = "postit-item";
    div.innerHTML = `<b>${name}</b><br>${msg}`;

    document.getElementById("board").appendChild(div);
}

/* 제비뽑기 */
function pick(t){
    const r = document.getElementById("result");
    r.innerText = "뽑는 중...";
    setTimeout(() => {
        r.innerText = "🎉 당첨: " + t;
    }, 500);
}

/* 갤러리 (로컬용) */
function upload(){
    const file = document.getElementById("imgFile").files[0];
    const name = document.getElementById("imgName").value;

    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(e){
        const div = document.createElement("div");
        div.className = "photo-card";
        div.innerHTML = `
            <img src="${e.target.result}">
            <div>${name}</div>
        `;
        document.getElementById("gallery").appendChild(div);
    }
    reader.readAsDataURL(file);
}
</script>

</body>
</html>
